app.admin.name=${ADMIN_NAME:BookMyRoute Admin}
app.admin.reset-password=${ADMIN_RESET_PASSWORD:false}

# ── Gmail SMTP ──────────────────────────────────
# IMPORTANT: spring.mail.password must be a Gmail App Password, NOT your Gmail account password.
# Steps to generate one:
#   1. Go to myaccount.google.com/security
#   2. Enable 2-Step Verification
#   3. Go to Security → App passwords → create one for "Mail"
#   4. Set the 16-character app password as MAIL_PASSWORD env variable
#      e.g.  export MAIL_PASSWORD="abcd efgh ijkl mnop"
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:book.my.route2026@gmail.com}
spring.mail.password=${MAIL_PASSWORD:pcxwmmdugrghbehv}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.default-encoding=UTF-8

# ── App Mail ────────────────────────────────────
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM:book.my.route2026@gmail.com}
app.mail.sender-name=${MAIL_SENDER_NAME:BookMyRoute}

# ── Logging ─────────────────────────────────────
logging.level.com.bookmyroute=DEBUG
logging.level.org.springframework.security=DEBUG