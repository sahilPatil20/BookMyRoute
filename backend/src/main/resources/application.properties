# ──────────────────────────────────────────────
#  BookMyRoute – application.properties
# ──────────────────────────────────────────────

# Server
server.port=8080

# Application name
spring.application.name=BookMyRoute

# ── Database ────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyroute?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ─────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Jackson ─────────────────────────────────────
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ─────────────────────────────────────────
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── CORS ────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Admin Bootstrap ─────────────────────────────
app.admin.email=${ADMIN_EMAIL:book.my.route2026@gmail.com}
